<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ImagePro - Green Screen Remover</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        <header>
            <h1>🎬 ImagePro</h1>
            <p>Remove green screen backgrounds instantly</p>
        </header>

        <main>
            <div class="controls-section">
                <div class="input-group">
                    <label for="imageInput">Upload Image:</label>
                    <input type="file" id="imageInput" accept="image/*">
                </div>

                <div class="settings-panel">
                    <div class="setting-group">
                        <label for="tolerance">Green Screen Sensitivity (0-100):</label>
                        <input type="range" id="tolerance" min="0" max="100" value="30">
                        <span id="toleranceValue">30</span>
                    </div>
                </div>

                <div class="button-group">
                    <button id="processBtn" class="btn btn-primary">Remove Green Screen</button>
                    <button id="downloadBtn" class="btn btn-secondary" disabled>Download</button>
                    <button id="resetBtn" class="btn btn-secondary">Reset</button>
                </div>
            </div>

            <div class="preview-section">
                <div class="preview-box">
                    <h3>Original</h3>
                    <canvas id="originalCanvas"></canvas>
                    <p id="originalInfo"></p>
                </div>

                <div class="preview-box">
                    <h3>Processed</h3>
                    <canvas id="processedCanvas"></canvas>
                    <p id="processedInfo"></p>
                </div>
            </div>
        </main>

        <footer>
            <p>Made with ❤️ | ImagePro v1.0</p>
        </footer>
    </div>

    <script src="script.js"></script>
</body>
</html>
